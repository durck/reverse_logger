services:
  reverse_ssh:
    image: ${REVERSE_SSH_IMAGE:?set REVERSE_SSH_IMAGE in .env}
    pull_policy: never
    container_name: reverse_ssh
    restart: unless-stopped
    environment:
      EXTERNAL_ADDRESS: ${REVERSE_SSH_EXTERNAL_ADDRESS:?set REVERSE_SSH_EXTERNAL_ADDRESS in .env}
      SEED_AUTHORIZED_KEYS: ${SEED_AUTHORIZED_KEYS:?set SEED_AUTHORIZED_KEYS in .env}
      RSSH_WS_PATH: ${REVERSE_SSH_WS_PATH:-/ws}
      RSSH_PUSH_PATH: ${REVERSE_SSH_PUSH_PATH:-/push}
      RSSH_TRUSTED_PROXY_CIDR: ${REVERSE_SSH_TRUSTED_PROXY_CIDR:-}
    ports:
      - "${REVERSE_SSH_BIND_IP:?set REVERSE_SSH_BIND_IP in .env}:${REVERSE_SSH_BIND_PORT:-3232}:2222"
    volumes:
      - ${REVERSE_SSH_DATA_DIR:-./data/reverse_ssh}:/data
    networks:
      - reverse_internal

  rssh-logger:
    build:
      context: .
    image: reverse-logger/rssh-logger:local
    container_name: rssh-logger
    restart: unless-stopped
    environment:
      LISTEN_ADDR: ":8080"
      DATA_DIR: /data
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:?set WEBHOOK_TOKEN in .env}
      EDGE_FORWARD_TOKEN: ${EDGE_FORWARD_TOKEN:-}
      INGRESS_WS_PATH: ${INGRESS_WS_PATH:-/ws}
      INGRESS_PUSH_PATH: ${INGRESS_PUSH_PATH:-/push}
      CORRELATION_WEBHOOK_MATCH_BEFORE: ${CORRELATION_WEBHOOK_MATCH_BEFORE:-60s}
      CORRELATION_WEBHOOK_MATCH_AFTER: ${CORRELATION_WEBHOOK_MATCH_AFTER:-10s}
      CORRELATION_INGRESS_RECONCILE_BEFORE: ${CORRELATION_INGRESS_RECONCILE_BEFORE:-10s}
      CORRELATION_INGRESS_RECONCILE_AFTER: ${CORRELATION_INGRESS_RECONCILE_AFTER:-60s}
      CORRELATION_CLIENT_IP_FALLBACK_ENABLED: ${CORRELATION_CLIENT_IP_FALLBACK_ENABLED:-true}
      CORRELATION_UNIQUE_TIME_FALLBACK_ENABLED: ${CORRELATION_UNIQUE_TIME_FALLBACK_ENABLED:-true}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-}
    expose:
      - "8080"
    volumes:
      - ${LOGGER_DATA_DIR:-./data/logger}:/data
    networks:
      - reverse_internal

networks:
  reverse_internal:
    driver: bridge
