# Example Squid configuration for an authenticated Telegram-only HTTP CONNECT proxy.
# Install and adapt manually on the VPS. Do not expose this as an open proxy.

auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwd
auth_param basic realm telegram-proxy
acl authenticated proxy_auth REQUIRED

acl SSL_ports port 443
acl CONNECT method CONNECT
acl telegram_api dstdomain api.telegram.org

http_access deny !CONNECT
http_access deny !SSL_ports
http_access allow authenticated telegram_api
http_access deny all

http_port 3128
access_log /var/log/squid/access.log
cache deny all
