---
- name: Deploy reverse_ssh nginx edge entrypoint
  hosts: vps_edge
  become: true
  gather_facts: true

  pre_tasks:
    - name: Apply default edge deployment variables
      ansible.builtin.set_fact:
        reverse_logger_repo_url: "{{ reverse_logger_repo_url | default('https://github.com/durck/reverse_logger.git', true) }}"
        reverse_logger_repo_version: "{{ reverse_logger_repo_version | default('main', true) }}"
        reverse_logger_repo_update: "{{ reverse_logger_repo_update | default(true) }}"
        reverse_logger_src_dir: "{{ reverse_logger_src_dir | default('/opt/reverse-logger', true) }}"
        nginx_edge_listen_addr: "{{ nginx_edge_listen_addr | default('127.0.0.1:18080', true) }}"
        nginx_edge_capture_mode: "{{ nginx_edge_capture_mode | default('mirror', true) }}"
        nginx_edge_log_path: "{{ nginx_edge_log_path | default('', true) }}"
        nginx_edge_spool_dir: "{{ nginx_edge_spool_dir | default('/var/lib/reverse-logger/nginx-edge-spool', true) }}"
        nginx_edge_forward_interval: "{{ nginx_edge_forward_interval | default('1s', true) }}"
        nginx_edge_forward_timeout: "{{ nginx_edge_forward_timeout | default('5s', true) }}"
        nginx_edge_conf_path: "{{ nginx_edge_conf_path | default('/etc/nginx/sites-available/rssh-entrypoint.conf', true) }}"
        nginx_edge_sites_enabled_dir: "{{ nginx_edge_sites_enabled_dir | default('/etc/nginx/sites-enabled', true) }}"
        nginx_edge_remove_default_site: "{{ nginx_edge_remove_default_site | default(true) }}"
        nginx_edge_acme_enabled: "{{ nginx_edge_acme_enabled | default(true) }}"
        nginx_edge_acme_challenge: "{{ nginx_edge_acme_challenge | default('http-01', true) }}"
        nginx_edge_acme_email: "{{ nginx_edge_acme_email | default('', true) }}"
        nginx_edge_acme_webroot: "{{ nginx_edge_acme_webroot | default('/var/www/letsencrypt', true) }}"
        nginx_edge_acme_dns_multi_credentials_path: "{{ nginx_edge_acme_dns_multi_credentials_path | default('/etc/letsencrypt/dns-multi.ini', true) }}"
        nginx_edge_acme_cert_name: "{{ nginx_edge_acme_cert_name | default(rssh_domain | default('', true), true) }}"
        nginx_edge_acme_force_renewal: "{{ nginx_edge_acme_force_renewal | default(false) }}"
        nginx_edge_acme_staging: "{{ nginx_edge_acme_staging | default(false) }}"
        nginx_edge_acme_http01_fallback_to_dns_timeweb: "{{ nginx_edge_acme_http01_fallback_to_dns_timeweb | default(true) }}"
        nginx_edge_acme_http01_preflight_enabled: "{{ nginx_edge_acme_http01_preflight_enabled | default(true) }}"
        nginx_edge_acme_http01_preflight_timeout: "{{ nginx_edge_acme_http01_preflight_timeout | default(10, true) }}"
        vps_internal_ip_probe_enabled: "{{ vps_internal_ip_probe_enabled | default(true) }}"
        vps_internal_ip_probe_required: "{{ vps_internal_ip_probe_required | default(false) }}"
        vps_internal_ip_probe_timeout: "{{ vps_internal_ip_probe_timeout | default(5, true) }}"
        vps_internal_ip_probe_validate_certs: "{{ vps_internal_ip_probe_validate_certs | default(true) }}"
        nginx_edge_create_self_signed_cert: "{{ nginx_edge_create_self_signed_cert | default(false) }}"
        nginx_edge_self_signed_days: "{{ nginx_edge_self_signed_days | default(30, true) }}"
        timewebcloud_propagation_timeout: "{{ timewebcloud_propagation_timeout | default(120, true) }}"
        timewebcloud_polling_interval: "{{ timewebcloud_polling_interval | default(5, true) }}"
        nginx_edge_acme_dns_multi_propagation_seconds: "{{ nginx_edge_acme_dns_multi_propagation_seconds | default(timewebcloud_propagation_timeout | default(120, true), true) }}"
        nginx_edge_acme_dns_multi_nameservers: "{{ nginx_edge_acme_dns_multi_nameservers | default('', true) }}"
        nginx_edge_network_retries: "{{ nginx_edge_network_retries | default(5, true) }}"
        nginx_edge_network_delay: "{{ nginx_edge_network_delay | default(10, true) }}"
        nginx_edge_snap_retries: "{{ nginx_edge_snap_retries | default(8, true) }}"
        nginx_edge_snap_delay: "{{ nginx_edge_snap_delay | default(20, true) }}"
        nginx_edge_snap_refresh_core_after_install: "{{ nginx_edge_snap_refresh_core_after_install | default(true) }}"
        nginx_edge_acme_retries: "{{ nginx_edge_acme_retries | default(2, true) }}"
        nginx_edge_acme_delay: "{{ nginx_edge_acme_delay | default(30, true) }}"
        tls_cert_path: "{{ tls_cert_path | default('/etc/letsencrypt/live/' ~ (nginx_edge_acme_cert_name | default(rssh_domain | default('', true), true)) ~ '/fullchain.pem', true) }}"
        tls_key_path: "{{ tls_key_path | default('/etc/letsencrypt/live/' ~ (nginx_edge_acme_cert_name | default(rssh_domain | default('', true), true)) ~ '/privkey.pem', true) }}"
        redirect_target: "{{ redirect_target | default('https://example.com', true) }}"
        rssh_ws_path: "{{ rssh_ws_path | default('/ws', true) }}"
        rssh_push_path: "{{ rssh_push_path | default('/push', true) }}"
        rssh_download_path_prefix: "{{ rssh_download_path_prefix | default('/dl', true) }}"
        rssh_random_paths_enabled: "{{ rssh_random_paths_enabled | default(false) }}"
        rssh_random_paths_force: "{{ rssh_random_paths_force | default(false) }}"
        rssh_random_paths_allow_regenerate: "{{ rssh_random_paths_allow_regenerate | default(true) }}"
        rssh_random_paths_regenerate: "{{ rssh_random_paths_regenerate | default(false) }}"
        rssh_random_paths_state_dir: "{{ rssh_random_paths_state_dir | default(playbook_dir ~ '/.generated-paths', true) }}"
        rssh_random_path_min_length: "{{ rssh_random_path_min_length | default(6, true) }}"
        rssh_random_path_max_length: "{{ rssh_random_path_max_length | default(15, true) }}"
        rssh_random_path_chars: "{{ rssh_random_path_chars | default('ascii_lowercase,digits', true) }}"
        main_reverse_ssh_port: "{{ main_reverse_ssh_port | default(3232, true) }}"
        main_logger_port: "{{ main_logger_port | default(8080, true) }}"
      tags: always

    - name: Resolve random or configured public paths
      ansible.builtin.import_tasks: tasks/resolve-rssh-paths.yml

    - name: Derive backend_reverse_ssh_url from main_internal_ip
      ansible.builtin.set_fact:
        backend_reverse_ssh_url: "https://{{ main_internal_ip }}:{{ main_reverse_ssh_port }}"
      when:
        - main_internal_ip is defined
        - main_internal_ip | length > 0
        - backend_reverse_ssh_url is not defined or backend_reverse_ssh_url | length == 0

    - name: Derive edge_forward_url from main_internal_ip
      ansible.builtin.set_fact:
        edge_forward_url: "http://{{ main_internal_ip }}:{{ main_logger_port }}/ingress-events"
      when:
        - main_internal_ip is defined
        - main_internal_ip | length > 0
        - edge_forward_url is not defined or edge_forward_url | length == 0

    - name: Derive vps_name from inventory hostname
      ansible.builtin.set_fact:
        vps_name: "{{ inventory_hostname }}"
      when: vps_name is not defined or vps_name | length == 0

    - name: Derive vps_public_ip from inventory or default IPv4
      ansible.builtin.set_fact:
        vps_public_ip: "{{ hostvars[inventory_hostname].ansible_host | default(ansible_facts.get('default_ipv4', {}).get('address', ''), true) }}"
      when: vps_public_ip is not defined or vps_public_ip | length == 0

    - name: Extract backend and logger URL authorities
      ansible.builtin.set_fact:
        backend_reverse_ssh_authority: "{{ backend_reverse_ssh_url | default('', true) | regex_replace('^[A-Za-z][A-Za-z0-9+.-]*://', '') | regex_replace('/.*$', '') }}"
        edge_forward_authority: "{{ edge_forward_url | default('', true) | regex_replace('^[A-Za-z][A-Za-z0-9+.-]*://', '') | regex_replace('/.*$', '') }}"

    - name: Resolve backend and logger reachability endpoints
      ansible.builtin.set_fact:
        backend_reverse_ssh_host: "{{ backend_reverse_ssh_authority | regex_replace(':([0-9]+)$', '') }}"
        backend_reverse_ssh_port_resolved: "{{ (backend_reverse_ssh_authority | regex_search(':([0-9]+)$', '\\1') | default([main_reverse_ssh_port], true) | first) | int }}"
        edge_forward_host: "{{ edge_forward_authority | regex_replace(':([0-9]+)$', '') }}"
        edge_forward_port_resolved: "{{ (edge_forward_authority | regex_search(':([0-9]+)$', '\\1') | default([main_logger_port], true) | first) | int }}"

    - name: Derive main-observed source IP probe URL
      ansible.builtin.set_fact:
        edge_source_ip_probe_url: >-
          {{
            (edge_forward_url | regex_replace('/+$', '') | regex_replace('/ingress-events$', '/edge/source-ip'))
            if ((edge_forward_url | regex_replace('/+$', '')) is search('/ingress-events$'))
            else ((edge_forward_url | regex_replace('/+$', '')) ~ '/edge/source-ip')
          }}
      when:
        - vps_internal_ip_probe_enabled | bool
        - vps_internal_ip is not defined or vps_internal_ip | length == 0

    - name: Detect main-observed VPS source IP
      block:
        - name: Query main-observed VPS source IP
          ansible.builtin.uri:
            url: "{{ edge_source_ip_probe_url }}"
            method: GET
            headers:
              Authorization: "Bearer {{ edge_forward_token }}"
            return_content: true
            status_code: 200
            timeout: "{{ vps_internal_ip_probe_timeout | int }}"
            validate_certs: "{{ vps_internal_ip_probe_validate_certs | bool }}"
          register: vps_source_ip_probe
          changed_when: false
          no_log: true
          until: (vps_source_ip_probe.status | default(0) | int) == 200
          retries: "{{ nginx_edge_network_retries | int }}"
          delay: "{{ nginx_edge_network_delay | int }}"
      rescue:
        - name: Continue without main-observed VPS source IP
          ansible.builtin.debug:
            msg: >-
              Source IP probe failed after retries; continuing because
              vps_internal_ip_probe_required={{ vps_internal_ip_probe_required | bool }}.
          changed_when: false
      when:
        - vps_internal_ip_probe_enabled | bool
        - edge_source_ip_probe_url is defined
        - vps_internal_ip is not defined or vps_internal_ip | length == 0

    - name: Record main-observed VPS source IP
      ansible.builtin.set_fact:
        vps_internal_ip: "{{ vps_source_ip_probe.json.source_ip | default('', true) }}"
      when:
        - vps_source_ip_probe is defined
        - (vps_source_ip_probe.status | default(0) | int) == 200
        - vps_source_ip_probe.json is defined
        - vps_source_ip_probe.json.source_ip | default('', true) | length > 0
        - vps_internal_ip is not defined or vps_internal_ip | length == 0

    - name: Stop when main-observed VPS source IP probe is required
      ansible.builtin.fail:
        msg: >-
          Could not detect the VPS source IP observed by the main logger through
          {{ edge_source_ip_probe_url | default('the source IP probe endpoint') }}.
          Set vps_internal_ip explicitly or keep vps_internal_ip_probe_required=false
          to rely on forwarder_ip correlation fallback.
      when:
        - vps_internal_ip_probe_required | bool
        - vps_internal_ip | default('', true) | length == 0

    - name: Derive ACME email from edge domain
      ansible.builtin.set_fact:
        nginx_edge_acme_email: "admin@{{ rssh_domain }}"
      when:
        - rssh_domain is defined
        - rssh_domain | length > 0
        - nginx_edge_acme_email is not defined or nginx_edge_acme_email | length == 0

    - name: Derive ACME lineage paths
      ansible.builtin.set_fact:
        nginx_edge_acme_expected_cert_path: "/etc/letsencrypt/live/{{ nginx_edge_acme_cert_name }}/fullchain.pem"
        nginx_edge_acme_expected_key_path: "/etc/letsencrypt/live/{{ nginx_edge_acme_cert_name }}/privkey.pem"
      when: nginx_edge_acme_enabled | bool

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - rssh_domain is defined
          - rssh_domain | length > 0
          - main_internal_ip is defined or backend_reverse_ssh_url is defined
          - backend_reverse_ssh_url is defined
          - backend_reverse_ssh_url | length > 0
          - backend_reverse_ssh_host | length > 0
          - backend_reverse_ssh_port_resolved | int > 0
          - edge_forward_url is defined
          - edge_forward_url | length > 0
          - edge_forward_host | length > 0
          - edge_forward_port_resolved | int > 0
          - edge_forward_token is defined
          - edge_forward_token | length > 20
          - edge_forward_token != 'replace_with_EDGE_FORWARD_TOKEN'
          - vps_name is defined
          - vps_public_ip is defined
          - vps_internal_ip | default('', true) | length == 0 or vps_internal_ip is match('^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$')
          - rssh_ws_path is match('^/.+')
          - rssh_push_path is match('^/.+')
          - rssh_ws_path != '/'
          - rssh_push_path != '/'
          - rssh_ws_path[-1] != '/'
          - rssh_push_path[-1] != '/'
          - rssh_download_path_prefix is match('^/.+')
          - rssh_download_path_prefix != '/'
          - rssh_download_path_prefix[-1] != '/'
          - nginx_edge_acme_challenge in ['http-01', 'dns-timeweb']
          - not (nginx_edge_acme_enabled | bool and nginx_edge_create_self_signed_cert | bool)
        fail_msg: >-
          Fill deploy/ansible/group_vars/vps_edge.yml and per-host rssh_domain in
          inventory.ini. Ensure the VPS can reach the main reverse_ssh and logger
          endpoints. vps_internal_ip is optional; when absent, central correlation
          falls back to the observed forwarder_ip.

    - name: Validate ACME variables
      ansible.builtin.assert:
        that:
          - nginx_edge_acme_email is defined
          - nginx_edge_acme_email | length > 3
          - "'@' in nginx_edge_acme_email"
          - nginx_edge_acme_cert_name is defined
          - nginx_edge_acme_cert_name | length > 0
          - tls_cert_path == nginx_edge_acme_expected_cert_path
          - tls_key_path == nginx_edge_acme_expected_key_path
        fail_msg: >-
          Set nginx_edge_acme_email and keep ACME TLS paths aligned with
          nginx_edge_acme_cert_name. Certbot manages
          /etc/letsencrypt/live/<cert-name>/fullchain.pem and privkey.pem.
      when: nginx_edge_acme_enabled | bool

    - name: Validate HTTP-01 ACME variables
      ansible.builtin.assert:
        that:
          - nginx_edge_acme_webroot is defined
          - nginx_edge_acme_webroot | length > 1
        fail_msg: Set nginx_edge_acme_webroot for HTTP-01 issuance.
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'

    - name: Show ACME Timeweb DNS-01 fallback status
      ansible.builtin.debug:
        msg:
          - "acme_challenge={{ nginx_edge_acme_challenge }}"
          - "http01_fallback_to_dns_timeweb={{ nginx_edge_acme_http01_fallback_to_dns_timeweb | bool }}"
          - "timeweb_token_available={{ timewebcloud_auth_token is defined and (timewebcloud_auth_token | default('', true) | length > 20) and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN' }}"
      when: nginx_edge_acme_enabled | bool

    - name: Validate Timeweb DNS-01 ACME variables
      ansible.builtin.assert:
        that:
          - timewebcloud_auth_token is defined
          - timewebcloud_auth_token | default('', true) | length > 20
          - timewebcloud_auth_token | default('', true) != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          - nginx_edge_acme_dns_multi_credentials_path is defined
          - nginx_edge_acme_dns_multi_credentials_path | length > 1
        fail_msg: Set timewebcloud_auth_token for Timeweb DNS-01 issuance.
      when:
        - nginx_edge_acme_enabled | bool
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
          )
      no_log: true

    - name: Validate production certificate paths
      ansible.builtin.assert:
        that:
          - tls_cert_path is defined
          - tls_cert_path | length > 0
          - tls_key_path is defined
          - tls_key_path | length > 0
        fail_msg: Set tls_cert_path/tls_key_path or enable nginx_edge_create_self_signed_cert for smoke tests.
      when: not nginx_edge_create_self_signed_cert | bool

    - name: Install OS packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - golang-go
          - nginx
          - openssl
        update_cache: true
        cache_valid_time: 3600
        state: present
      register: os_packages_install
      until: os_packages_install is succeeded
      retries: "{{ nginx_edge_network_retries | int }}"
      delay: "{{ nginx_edge_network_delay | int }}"
      when: ansible_facts['os_family'] == 'Debian'

    - name: Check reverse_ssh backend reachability from VPS
      ansible.builtin.wait_for:
        host: "{{ backend_reverse_ssh_host }}"
        port: "{{ backend_reverse_ssh_port_resolved }}"
        timeout: 5
        connect_timeout: 2
      register: reverse_ssh_backend_reachability
      changed_when: false
      until: reverse_ssh_backend_reachability is succeeded
      retries: "{{ nginx_edge_network_retries | int }}"
      delay: "{{ nginx_edge_network_delay | int }}"
      when:
        - backend_reverse_ssh_host is defined
        - backend_reverse_ssh_host | length > 0

    - name: Check central logger reachability from VPS
      ansible.builtin.wait_for:
        host: "{{ edge_forward_host }}"
        port: "{{ edge_forward_port_resolved }}"
        timeout: 5
        connect_timeout: 2
      register: central_logger_reachability
      changed_when: false
      until: central_logger_reachability is succeeded
      retries: "{{ nginx_edge_network_retries | int }}"
      delay: "{{ nginx_edge_network_delay | int }}"
      when:
        - edge_forward_host is defined
        - edge_forward_host | length > 0

    - name: Install snapd for Certbot
      ansible.builtin.apt:
        name: snapd
        state: present
        cache_valid_time: 3600
      register: snapd_install
      until: snapd_install is succeeded
      retries: "{{ nginx_edge_network_retries | int }}"
      delay: "{{ nginx_edge_network_delay | int }}"
      when:
        - ansible_facts['os_family'] == 'Debian'
        - nginx_edge_acme_enabled | bool
      tags:
        - snap

    - name: Enable snapd socket
      ansible.builtin.systemd:
        name: snapd.socket
        enabled: true
        state: started
      when: nginx_edge_acme_enabled | bool
      tags:
        - snap

    - name: Wait for snapd seed
      ansible.builtin.command:
        argv:
          - snap
          - wait
          - system
          - seed.loaded
      register: snap_seed_wait
      changed_when: false
      until: snap_seed_wait.rc == 0
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when: nginx_edge_acme_enabled | bool
      tags:
        - snap

    - name: Check installed snap core
      ansible.builtin.command:
        argv:
          - snap
          - list
          - core
      register: snap_core_list
      changed_when: false
      failed_when: false
      when: nginx_edge_acme_enabled | bool
      tags:
        - snap

    - name: Check Snap Store DNS before installing core
      ansible.builtin.command:
        argv:
          - getent
          - hosts
          - api.snapcraft.io
      register: snap_core_store_dns
      changed_when: false
      until: snap_core_store_dns.rc == 0
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - (snap_core_list.rc | default(1) | int) != 0
      tags:
        - snap

    - name: Install snap core
      ansible.builtin.command:
        argv:
          - snap
          - install
          - core
      register: snap_core_install
      changed_when:
        - "'installed' in (snap_core_install.stdout + snap_core_install.stderr)"
        - "'already installed' not in (snap_core_install.stdout + snap_core_install.stderr)"
      failed_when:
        - snap_core_install.rc != 0
        - "'already installed' not in (snap_core_install.stdout + snap_core_install.stderr)"
      until: >-
        snap_core_install.rc == 0
        or 'already installed' in (snap_core_install.stdout + snap_core_install.stderr)
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - (snap_core_list.rc | default(1) | int) != 0
      tags:
        - snap

    - name: Refresh snap core
      ansible.builtin.command:
        argv:
          - snap
          - refresh
          - core
      register: snap_core_refresh
      changed_when: false
      until: snap_core_refresh.rc == 0
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_snap_refresh_core_after_install | bool
        - snap_core_install is defined
        - not (snap_core_install.skipped | default(false) | bool)
        - "'installed' in (snap_core_install.stdout + snap_core_install.stderr)"
        - "'already installed' not in (snap_core_install.stdout + snap_core_install.stderr)"
      tags:
        - snap

    - name: Check installed Certbot snap
      ansible.builtin.command:
        argv:
          - snap
          - list
          - certbot
      register: certbot_snap_list
      changed_when: false
      failed_when: false
      when: nginx_edge_acme_enabled | bool
      tags:
        - snap

    - name: Check Snap Store DNS before installing Certbot
      ansible.builtin.command:
        argv:
          - getent
          - hosts
          - api.snapcraft.io
      register: certbot_snap_store_dns
      changed_when: false
      until: certbot_snap_store_dns.rc == 0
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - (certbot_snap_list.rc | default(1) | int) != 0
      tags:
        - snap

    - name: Install Certbot snap
      ansible.builtin.command:
        argv:
          - snap
          - install
          - --classic
          - certbot
      register: certbot_snap_install
      changed_when:
        - "'installed' in (certbot_snap_install.stdout + certbot_snap_install.stderr)"
        - "'already installed' not in (certbot_snap_install.stdout + certbot_snap_install.stderr)"
      failed_when:
        - certbot_snap_install.rc != 0
        - "'already installed' not in (certbot_snap_install.stdout + certbot_snap_install.stderr)"
      until: >-
        certbot_snap_install.rc == 0
        or 'already installed' in (certbot_snap_install.stdout + certbot_snap_install.stderr)
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - (certbot_snap_list.rc | default(1) | int) != 0
      tags:
        - snap

    - name: Check installed certbot-dns-multi snap
      ansible.builtin.command:
        argv:
          - snap
          - list
          - certbot-dns-multi
      register: certbot_dns_multi_list
      changed_when: false
      failed_when: false
      when:
        - nginx_edge_acme_enabled | bool
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )
      tags:
        - snap

    - name: Check Snap Store DNS before installing certbot-dns-multi
      ansible.builtin.command:
        argv:
          - getent
          - hosts
          - api.snapcraft.io
      register: certbot_dns_multi_store_dns
      changed_when: false
      until: certbot_dns_multi_store_dns.rc == 0
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - (certbot_dns_multi_list.rc | default(1) | int) != 0
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )
      tags:
        - snap

    - name: Install certbot-dns-multi snap
      ansible.builtin.command:
        argv:
          - snap
          - install
          - certbot-dns-multi
      register: certbot_dns_multi_install
      changed_when:
        - "'installed' in (certbot_dns_multi_install.stdout + certbot_dns_multi_install.stderr)"
        - "'already installed' not in (certbot_dns_multi_install.stdout + certbot_dns_multi_install.stderr)"
      failed_when:
        - certbot_dns_multi_install.rc != 0
        - "'already installed' not in (certbot_dns_multi_install.stdout + certbot_dns_multi_install.stderr)"
      until: >-
        certbot_dns_multi_install.rc == 0
        or 'already installed' in (certbot_dns_multi_install.stdout + certbot_dns_multi_install.stderr)
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - (certbot_dns_multi_list.rc | default(1) | int) != 0
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )
      tags:
        - snap

    - name: Trust Certbot snap plugins with root
      ansible.builtin.command:
        argv:
          - snap
          - set
          - certbot
          - trust-plugin-with-root=ok
      register: certbot_snap_trust_plugin
      changed_when: false
      until: certbot_snap_trust_plugin.rc == 0
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )
      tags:
        - snap

    - name: Connect certbot-dns-multi plugin
      ansible.builtin.command:
        argv:
          - snap
          - connect
          - certbot:plugin
          - certbot-dns-multi
      register: certbot_dns_multi_connect
      changed_when: false
      failed_when:
        - certbot_dns_multi_connect.rc != 0
        - "'already connected' not in (certbot_dns_multi_connect.stdout + certbot_dns_multi_connect.stderr)"
      until: >-
        certbot_dns_multi_connect.rc == 0
        or 'already connected' in (certbot_dns_multi_connect.stdout + certbot_dns_multi_connect.stderr)
      retries: "{{ nginx_edge_snap_retries | int }}"
      delay: "{{ nginx_edge_snap_delay | int }}"
      when:
        - nginx_edge_acme_enabled | bool
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )
      tags:
        - snap

    - name: Link Certbot into /usr/bin
      ansible.builtin.file:
        src: /snap/bin/certbot
        dest: /usr/bin/certbot
        state: link
        force: true
      when: nginx_edge_acme_enabled | bool
      tags:
        - snap

    - name: Create Let's Encrypt configuration directory
      ansible.builtin.file:
        path: "{{ nginx_edge_acme_dns_multi_credentials_path | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when:
        - nginx_edge_acme_enabled | bool
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )

    - name: Render Timeweb DNS-01 credentials
      ansible.builtin.copy:
        dest: "{{ nginx_edge_acme_dns_multi_credentials_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          dns_multi_provider = timewebcloud
          TIMEWEBCLOUD_AUTH_TOKEN = "{{ timewebcloud_auth_token }}"
          TIMEWEBCLOUD_PROPAGATION_TIMEOUT = {{ timewebcloud_propagation_timeout }}
          TIMEWEBCLOUD_POLLING_INTERVAL = {{ timewebcloud_polling_interval }}
      no_log: true
      when:
        - nginx_edge_acme_enabled | bool
        - >-
          nginx_edge_acme_challenge == 'dns-timeweb'
          or (
            nginx_edge_acme_challenge == 'http-01'
            and nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )

  tasks:
    - name: Create repository parent directory
      ansible.builtin.file:
        path: "{{ reverse_logger_src_dir | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Clone reverse_logger repository
      ansible.builtin.git:
        repo: "{{ reverse_logger_repo_url }}"
        dest: "{{ reverse_logger_src_dir }}"
        version: "{{ reverse_logger_repo_version }}"
        update: "{{ reverse_logger_repo_update | bool }}"
      register: reverse_logger_repo_checkout
      until: reverse_logger_repo_checkout is succeeded
      retries: "{{ nginx_edge_network_retries | int }}"
      delay: "{{ nginx_edge_network_delay | int }}"

    - name: Download Go modules
      ansible.builtin.command:
        argv:
          - go
          - mod
          - download
      args:
        chdir: "{{ reverse_logger_src_dir }}"
      environment:
        CGO_ENABLED: "0"
      register: go_mod_download
      changed_when: false
      until: go_mod_download is succeeded
      retries: "{{ nginx_edge_network_retries | int }}"
      delay: "{{ nginx_edge_network_delay | int }}"

    - name: Build nginx-edge-forwarder
      ansible.builtin.command:
        argv:
          - go
          - build
          - -trimpath
          - -ldflags
          - -s -w
          - -o
          - /tmp/nginx-edge-forwarder
          - ./cmd/nginx-edge-forwarder
      args:
        chdir: "{{ reverse_logger_src_dir }}"
      environment:
        CGO_ENABLED: "0"
      changed_when: false

    - name: Install nginx-edge-forwarder binary
      ansible.builtin.copy:
        remote_src: true
        src: /tmp/nginx-edge-forwarder
        dest: /usr/local/bin/nginx-edge-forwarder
        owner: root
        group: root
        mode: "0755"
      notify: Restart nginx-edge-forwarder

    - name: Create reverse_logger config directory
      ansible.builtin.file:
        path: /etc/reverse-logger
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Create reverse_logger state directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      loop:
        - /var/lib/reverse-logger
        - "{{ nginx_edge_spool_dir }}"

    - name: Create ACME webroot
      ansible.builtin.file:
        path: "{{ nginx_edge_acme_webroot }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'

    - name: Check existing TLS certificate file
      ansible.builtin.stat:
        path: "{{ tls_cert_path }}"
      register: tls_certificate

    - name: Check existing TLS private key file
      ansible.builtin.stat:
        path: "{{ tls_key_path }}"
      register: tls_private_key

    - name: Record existing TLS material status
      ansible.builtin.set_fact:
        tls_material_exists: "{{ (tls_certificate.stat.exists | default(false)) and (tls_private_key.stat.exists | default(false)) }}"
        tls_material_partial: "{{ (tls_certificate.stat.exists | default(false)) != (tls_private_key.stat.exists | default(false)) }}"

    - name: Stop when TLS material is incomplete
      ansible.builtin.fail:
        msg: >-
          TLS material is incomplete for {{ rssh_domain }}:
          cert={{ tls_cert_path }} exists={{ tls_certificate.stat.exists | default(false) }},
          key={{ tls_key_path }} exists={{ tls_private_key.stat.exists | default(false) }}.
          Restore both files, remove the partial material, or force renewal.
      when:
        - tls_material_partial | bool
        - not (nginx_edge_acme_enabled | bool and nginx_edge_acme_force_renewal | bool)

    - name: Validate external TLS files when ACME is disabled
      ansible.builtin.assert:
        that:
          - tls_material_exists | bool
        fail_msg: >-
          nginx_edge_acme_enabled is false, so both tls_cert_path and
          tls_key_path must already exist before rendering nginx.
      when:
        - not (nginx_edge_acme_enabled | bool)
        - not (nginx_edge_create_self_signed_cert | bool)

    - name: Create self-signed TLS directory
      ansible.builtin.file:
        path: "{{ item | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      loop:
        - "{{ tls_cert_path }}"
        - "{{ tls_key_path }}"
      when: nginx_edge_create_self_signed_cert | bool

    - name: Generate self-signed TLS certificate for smoke tests
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -x509
          - -newkey
          - rsa:4096
          - -nodes
          - -sha256
          - -days
          - "{{ nginx_edge_self_signed_days | string }}"
          - -subj
          - "/CN={{ rssh_domain }}"
          - -keyout
          - "{{ tls_key_path }}"
          - -out
          - "{{ tls_cert_path }}"
      args:
        creates: "{{ tls_cert_path }}"
      when: nginx_edge_create_self_signed_cert | bool

    - name: Render ACME bootstrap nginx configuration
      ansible.builtin.template:
        src: rssh-acme-bootstrap.conf.j2
        dest: "{{ nginx_edge_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - not (tls_material_exists | bool)

    - name: Enable nginx entrypoint site for ACME bootstrap
      ansible.builtin.file:
        src: "{{ nginx_edge_conf_path }}"
        dest: "{{ nginx_edge_sites_enabled_dir }}/{{ nginx_edge_conf_path | basename }}"
        state: link
        force: true
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - not (tls_material_exists | bool)

    - name: Remove default nginx site before ACME bootstrap
      ansible.builtin.file:
        path: "{{ nginx_edge_sites_enabled_dir }}/default"
        state: absent
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - not (tls_material_exists | bool)
        - nginx_edge_remove_default_site | bool

    - name: Validate ACME bootstrap nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - not (tls_material_exists | bool)

    - name: Enable and start nginx for ACME bootstrap
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - not (tls_material_exists | bool)

    - name: Reload nginx for ACME bootstrap
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - not (tls_material_exists | bool)

    - name: Render nginx entrypoint configuration before ACME renewal
      ansible.builtin.template:
        src: rssh-wss-https-entrypoint.conf.j2
        dest: "{{ nginx_edge_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      when:
        - nginx_edge_acme_enabled | bool
        - tls_material_exists | bool

    - name: Enable nginx entrypoint site before ACME renewal
      ansible.builtin.file:
        src: "{{ nginx_edge_conf_path }}"
        dest: "{{ nginx_edge_sites_enabled_dir }}/{{ nginx_edge_conf_path | basename }}"
        state: link
        force: true
      when:
        - nginx_edge_acme_enabled | bool
        - tls_material_exists | bool

    - name: Remove default nginx site before ACME renewal
      ansible.builtin.file:
        path: "{{ nginx_edge_sites_enabled_dir }}/default"
        state: absent
      when:
        - nginx_edge_acme_enabled | bool
        - tls_material_exists | bool
        - nginx_edge_remove_default_site | bool

    - name: Validate nginx configuration before ACME renewal
      ansible.builtin.command: nginx -t
      changed_when: false
      when:
        - nginx_edge_acme_enabled | bool
        - tls_material_exists | bool

    - name: Enable and start nginx before ACME renewal
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started
      when:
        - nginx_edge_acme_enabled | bool
        - tls_material_exists | bool

    - name: Reload nginx before ACME renewal
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      when:
        - nginx_edge_acme_enabled | bool
        - tls_material_exists | bool

    - name: Prepare HTTP-01 preflight values
      ansible.builtin.set_fact:
        nginx_edge_acme_http01_preflight_token: "ansible-http01-preflight-{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '-') }}"
        nginx_edge_acme_http01_preflight_content: "ok-{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '-') }}"
        nginx_edge_acme_http01_preflight_ok: true
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'

    - name: Create HTTP-01 preflight challenge directory
      ansible.builtin.file:
        path: "{{ nginx_edge_acme_webroot }}/.well-known/acme-challenge"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - nginx_edge_acme_http01_preflight_enabled | bool

    - name: Write HTTP-01 preflight challenge file
      ansible.builtin.copy:
        dest: "{{ nginx_edge_acme_webroot }}/.well-known/acme-challenge/{{ nginx_edge_acme_http01_preflight_token }}"
        owner: root
        group: root
        mode: "0644"
        content: "{{ nginx_edge_acme_http01_preflight_content }}\n"
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - nginx_edge_acme_http01_preflight_enabled | bool

    - name: Check HTTP-01 preflight challenge from control node
      block:
        - name: Fetch HTTP-01 preflight challenge from control node
          ansible.builtin.uri:
            url: "http://{{ rssh_domain }}/.well-known/acme-challenge/{{ nginx_edge_acme_http01_preflight_token }}"
            method: GET
            return_content: true
            status_code: 200
            timeout: "{{ nginx_edge_acme_http01_preflight_timeout | int }}"
          delegate_to: localhost
          become: false
          register: nginx_edge_acme_http01_preflight
          changed_when: false
          until: >-
            (nginx_edge_acme_http01_preflight.status | default(0) | int) == 200
            and (nginx_edge_acme_http01_preflight.content | default('') | trim) == nginx_edge_acme_http01_preflight_content
          retries: "{{ nginx_edge_network_retries | int }}"
          delay: "{{ nginx_edge_network_delay | int }}"
      rescue:
        - name: Continue after HTTP-01 preflight failure
          ansible.builtin.debug:
            msg: >-
              HTTP-01 preflight failed after retries; certbot HTTP-01 will be
              skipped and DNS-01 fallback will run when configured.
          changed_when: false
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - nginx_edge_acme_http01_preflight_enabled | bool

    - name: Record HTTP-01 preflight result
      ansible.builtin.set_fact:
        nginx_edge_acme_http01_preflight_ok: >-
          {{
            (not (nginx_edge_acme_http01_preflight_enabled | bool))
            or (
              nginx_edge_acme_http01_preflight is defined
              and (nginx_edge_acme_http01_preflight.status | default(0) | int) == 200
              and (nginx_edge_acme_http01_preflight.content | default('') | trim) == nginx_edge_acme_http01_preflight_content
            )
          }}
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'

    - name: Show HTTP-01 preflight result
      ansible.builtin.debug:
        msg:
          - "http01_preflight_ok={{ nginx_edge_acme_http01_preflight_ok | default(true) | bool }}"
          - "http01_preflight_url=http://{{ rssh_domain }}/.well-known/acme-challenge/{{ nginx_edge_acme_http01_preflight_token | default('not-run') }}"
          - "http01_preflight_status={{ nginx_edge_acme_http01_preflight.status | default('not-run') }}"
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'

    - name: Create Certbot renewal hook directory
      ansible.builtin.file:
        path: /etc/letsencrypt/renewal-hooks/deploy
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: nginx_edge_acme_enabled | bool

    - name: Install nginx reload renewal hook
      ansible.builtin.copy:
        dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/sh
          set -eu
          nginx -t
          systemctl reload nginx
      when: nginx_edge_acme_enabled | bool

    - name: Issue or renew ACME certificate with Timeweb DNS-01
      ansible.builtin.command:
        argv: >-
          {{
            ['certbot', 'certonly']
            + ['--cert-name', nginx_edge_acme_cert_name]
            + ['-a', 'dns-multi', '--dns-multi-credentials', nginx_edge_acme_dns_multi_credentials_path, '--preferred-challenges', 'dns']
            + ['--dns-multi-propagation-seconds', nginx_edge_acme_dns_multi_propagation_seconds | string]
            + (((nginx_edge_acme_dns_multi_nameservers | default('', true) | length) > 0) | ternary(['--dns-multi-nameservers', nginx_edge_acme_dns_multi_nameservers], []))
            + ['-d', rssh_domain, '--email', nginx_edge_acme_email, '--agree-tos', '--non-interactive']
            + (nginx_edge_acme_force_renewal | bool | ternary(['--force-renewal'], ['--keep-until-expiring']))
            + (nginx_edge_acme_staging | bool | ternary(['--staging'], []))
          }}
      register: certbot_dns_issue
      changed_when: "(certbot_dns_issue.stdout + certbot_dns_issue.stderr) is search('Successfully received certificate|Congratulations')"
      until: certbot_dns_issue.rc == 0
      retries: "{{ nginx_edge_acme_retries | int }}"
      delay: "{{ nginx_edge_acme_delay | int }}"
      notify: Reload nginx
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'dns-timeweb'

    - name: Issue or renew ACME certificate with HTTP-01
      ansible.builtin.command:
        argv: >-
          {{
            ['certbot', 'certonly']
            + ['--cert-name', nginx_edge_acme_cert_name]
            + ['--webroot', '-w', nginx_edge_acme_webroot, '--preferred-challenges', 'http']
            + ['-d', rssh_domain, '--email', nginx_edge_acme_email, '--agree-tos', '--non-interactive']
            + (nginx_edge_acme_force_renewal | bool | ternary(['--force-renewal'], ['--keep-until-expiring']))
            + (nginx_edge_acme_staging | bool | ternary(['--staging'], []))
          }}
      register: certbot_http_issue
      changed_when: "(certbot_http_issue.stdout + certbot_http_issue.stderr) is search('Successfully received certificate|Congratulations')"
      failed_when: false
      notify: Reload nginx
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - nginx_edge_acme_http01_preflight_ok | default(true) | bool

    - name: Record HTTP-01 issuance status
      ansible.builtin.set_fact:
        certbot_http_failed: >-
          {{
            not (nginx_edge_acme_http01_preflight_ok | default(true) | bool)
            or (
              certbot_http_issue is defined
              and not (certbot_http_issue.skipped | default(false) | bool)
              and (certbot_http_issue.rc | default(0) | int) != 0
            )
          }}
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'

    - name: Fall back to Timeweb DNS-01 after HTTP-01 preflight or ACME failure
      ansible.builtin.command:
        argv: >-
          {{
            ['certbot', 'certonly']
            + ['--cert-name', nginx_edge_acme_cert_name]
            + ['-a', 'dns-multi', '--dns-multi-credentials', nginx_edge_acme_dns_multi_credentials_path, '--preferred-challenges', 'dns']
            + ['--dns-multi-propagation-seconds', nginx_edge_acme_dns_multi_propagation_seconds | string]
            + (((nginx_edge_acme_dns_multi_nameservers | default('', true) | length) > 0) | ternary(['--dns-multi-nameservers', nginx_edge_acme_dns_multi_nameservers], []))
            + ['-d', rssh_domain, '--email', nginx_edge_acme_email, '--agree-tos', '--non-interactive']
            + (nginx_edge_acme_force_renewal | bool | ternary(['--force-renewal'], ['--keep-until-expiring']))
            + (nginx_edge_acme_staging | bool | ternary(['--staging'], []))
          }}
      register: certbot_dns_fallback_issue
      changed_when: "(certbot_dns_fallback_issue.stdout + certbot_dns_fallback_issue.stderr) is search('Successfully received certificate|Congratulations')"
      until: certbot_dns_fallback_issue.rc == 0
      retries: "{{ nginx_edge_acme_retries | int }}"
      delay: "{{ nginx_edge_acme_delay | int }}"
      notify: Reload nginx
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - certbot_http_failed | default(false) | bool
        - nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
        - timewebcloud_auth_token is defined
        - timewebcloud_auth_token | default('', true) | length > 20
        - timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'

    - name: Fail when HTTP-01 failed and Timeweb DNS-01 fallback is unavailable
      ansible.builtin.fail:
        msg: >-
          HTTP-01 certificate issuance failed and Timeweb DNS-01 fallback is not
          available. Either open public 80/tcp for {{ rssh_domain }} or set
          timewebcloud_auth_token with nginx_edge_acme_http01_fallback_to_dns_timeweb=true.
          HTTP-01 preflight status={{ nginx_edge_acme_http01_preflight.status | default('not-run') }}
          url=http://{{ rssh_domain }}/.well-known/acme-challenge/{{ nginx_edge_acme_http01_preflight_token | default('not-run') }}.
          HTTP-01 stderr: {{ certbot_http_issue.stderr | default('certbot was not run because HTTP-01 preflight failed') }}
      when:
        - nginx_edge_acme_enabled | bool
        - nginx_edge_acme_challenge == 'http-01'
        - certbot_http_failed | default(false) | bool
        - >-
          not (
            nginx_edge_acme_http01_fallback_to_dns_timeweb | bool
            and timewebcloud_auth_token is defined
            and (timewebcloud_auth_token | default('', true) | length > 20)
            and timewebcloud_auth_token != 'replace_with_TIMEWEBCLOUD_AUTH_TOKEN'
          )

    - name: Check TLS certificate file after ACME issuance
      ansible.builtin.stat:
        path: "{{ tls_cert_path }}"
      register: tls_certificate_after_acme
      when: nginx_edge_acme_enabled | bool

    - name: Check TLS private key file after ACME issuance
      ansible.builtin.stat:
        path: "{{ tls_key_path }}"
      register: tls_private_key_after_acme
      when: nginx_edge_acme_enabled | bool

    - name: Validate ACME TLS files after issuance
      ansible.builtin.assert:
        that:
          - tls_certificate_after_acme.stat.exists | default(false)
          - tls_private_key_after_acme.stat.exists | default(false)
        fail_msg: >-
          ACME completed but expected TLS files are missing:
          cert={{ tls_cert_path }} exists={{ tls_certificate_after_acme.stat.exists | default(false) }},
          key={{ tls_key_path }} exists={{ tls_private_key_after_acme.stat.exists | default(false) }}.
      when: nginx_edge_acme_enabled | bool

    - name: Render nginx-edge-forwarder environment
      ansible.builtin.template:
        src: nginx-edge-forwarder.env.j2
        dest: /etc/reverse-logger/nginx-edge-forwarder.env
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: Restart nginx-edge-forwarder

    - name: Install nginx-edge-forwarder systemd unit
      ansible.builtin.copy:
        remote_src: true
        src: "{{ reverse_logger_src_dir }}/deploy/systemd/nginx-edge-forwarder.service"
        dest: /etc/systemd/system/nginx-edge-forwarder.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart nginx-edge-forwarder

    - name: Render nginx entrypoint configuration
      ansible.builtin.template:
        src: rssh-wss-https-entrypoint.conf.j2
        dest: "{{ nginx_edge_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Enable nginx entrypoint site
      ansible.builtin.file:
        src: "{{ nginx_edge_conf_path }}"
        dest: "{{ nginx_edge_sites_enabled_dir }}/{{ nginx_edge_conf_path | basename }}"
        state: link
        force: true
      notify: Reload nginx

    - name: Remove default nginx site
      ansible.builtin.file:
        path: "{{ nginx_edge_sites_enabled_dir }}/default"
        state: absent
      when: nginx_edge_remove_default_site | bool
      notify: Reload nginx

    - name: Validate nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Enable and start nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Reload systemd after unit installation
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start nginx-edge-forwarder
      ansible.builtin.systemd:
        name: nginx-edge-forwarder
        enabled: true
        state: started

  post_tasks:
    - name: Show edge deployment summary
      ansible.builtin.debug:
        msg:
          - "host={{ inventory_hostname }}"
          - "domain={{ rssh_domain }}"
          - "public_ip={{ vps_public_ip }}"
          - "main_observed_source_ip={{ vps_internal_ip | default('not detected; central logger will use forwarder_ip fallback', true) }}"
          - "ws_path={{ rssh_ws_path }}"
          - "push_path={{ rssh_push_path }}"
          - "download_path_prefix={{ rssh_download_path_prefix }}"
          - "trusted_proxy_cidr={{ ((vps_internal_ip | default('', true) | length) > 0) | ternary((vps_internal_ip | default('', true)) ~ '/32', 'not available') }}"

    - name: Build trusted proxy CIDR list for main server
      ansible.builtin.set_fact:
        trusted_proxy_cidrs: >-
          {{
            groups['vps_edge']
            | map('extract', hostvars, 'vps_internal_ip')
            | select('defined')
            | select('match', '^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$')
            | map('regex_replace', '^(.*)$', '\\1/32')
            | list
            | unique
          }}
      run_once: true
      delegate_to: localhost

    - name: Show main server reverse_ssh trusted proxy setting
      ansible.builtin.debug:
        msg: >-
          {% if trusted_proxy_cidrs | length > 0 %}
          Add to main /opt/reverse-logger/.env:
          REVERSE_SSH_TRUSTED_PROXY_CIDR={{ trusted_proxy_cidrs | join(',') }}
          {% else %}
          No vps_internal_ip values were detected. Keep
          REVERSE_SSH_TRUSTED_PROXY_CIDR unchanged and rely on central
          forwarder_ip correlation fallback.
          {% endif %}
      run_once: true
      delegate_to: localhost

    - name: Collect ingress transport paths from all edge groups
      ansible.builtin.set_fact:
        ingress_ws_paths: >-
          {{
            groups['vps_edge']
            | map('extract', hostvars, 'rssh_ws_path')
            | select('defined')
            | list
            | unique
          }}
        ingress_push_paths: >-
          {{
            groups['vps_edge']
            | map('extract', hostvars, 'rssh_push_path')
            | select('defined')
            | list
            | unique
          }}
        main_ws_path_value: "{{ hostvars[groups['vps_edge'] | first].main_ws_path | default('/ws') }}"
        main_push_path_value: "{{ hostvars[groups['vps_edge'] | first].main_push_path | default('/push') }}"
      run_once: true
      delegate_to: localhost

    - name: Show main server ingress path settings
      ansible.builtin.debug:
        msg: >-
          Add to main /opt/reverse-logger/.env (comma-separated for all groups):
          INGRESS_WS_PATH={{ ingress_ws_paths | join(',') }}
          INGRESS_PUSH_PATH={{ ingress_push_paths | join(',') }}
          REVERSE_SSH_WS_PATH={{ main_ws_path_value }}
          REVERSE_SSH_PUSH_PATH={{ main_push_path_value }}
      run_once: true
      delegate_to: localhost

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Restart nginx-edge-forwarder
      ansible.builtin.systemd:
        name: nginx-edge-forwarder
        state: restarted
