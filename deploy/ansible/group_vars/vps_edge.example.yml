# Copy shared vars to group_vars/vps_edge.yml (gitignored).
# Per-group transport paths live in group_vars/edge_group_*.yml.

redirect_target: https://ya.ru

main_internal_ip: 10.21.125.154
main_reverse_ssh_port: 3232
main_logger_port: 8080

# reverse_ssh listener paths on main. Edge groups may expose different public
# paths; nginx rewrites public paths to these backend paths.
main_ws_path: /ws
main_push_path: /push

edge_forward_token: replace_with_EDGE_FORWARD_TOKEN

rssh_download_path_prefix: /dl

nginx_edge_acme_email: ""
nginx_edge_acme_enabled: true
nginx_edge_acme_webroot: /var/www/letsencrypt
nginx_edge_acme_staging: false
tls_cert_path: "/etc/letsencrypt/live/{{ rssh_domain }}/fullchain.pem"
tls_key_path: "/etc/letsencrypt/live/{{ rssh_domain }}/privkey.pem"
nginx_edge_create_self_signed_cert: false
nginx_edge_self_signed_days: 30

nginx_edge_listen_addr: 127.0.0.1:18080
nginx_edge_capture_mode: mirror
nginx_edge_log_path: ""
nginx_edge_spool_dir: /var/lib/reverse-logger/nginx-edge-spool
nginx_edge_forward_interval: 1s
nginx_edge_forward_timeout: 5s

nginx_edge_conf_path: /etc/nginx/sites-available/rssh-entrypoint.conf
nginx_edge_sites_enabled_dir: /etc/nginx/sites-enabled
nginx_edge_remove_default_site: true
