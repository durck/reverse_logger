# Copy shared vars to group_vars/vps_edge.yml (gitignored).
# Per-group transport paths live in group_vars/edge_group_*.yml.

redirect_target: https://example.com

reverse_logger_repo_update: true
reverse_logger_go_min_version: "1.23"
reverse_logger_go_toolchain: local
reverse_logger_go_proxy: https://goproxy.io,direct
reverse_logger_go_sumdb: "off"
reverse_logger_go_retries: 3
reverse_logger_go_delay: 10

main_internal_ip: 192.0.2.10
main_reverse_ssh_port: 3232
main_logger_port: 8080

# reverse_ssh listener paths on main. Edge groups may expose different public
# paths; nginx rewrites public paths to these backend paths.
main_ws_path: /ws
main_push_path: /push

edge_forward_token: replace_with_EDGE_FORWARD_TOKEN

rssh_download_path_prefix: /dl

# Optional: generate per-host public paths once and persist them locally in
# deploy/ansible/.generated-paths/<inventory_hostname>.yml.
# When enabled, default /ws, /push, and /dl values are replaced with random
# 6-15 character paths. Non-default explicit host/group values are kept unless
# rssh_random_paths_force is true.
rssh_random_paths_enabled: false
rssh_random_paths_force: false
rssh_random_paths_allow_regenerate: true
rssh_random_paths_regenerate: false
rssh_random_paths_state_dir: "{{ playbook_dir }}/.generated-paths"
rssh_random_path_min_length: 6
rssh_random_path_max_length: 15
rssh_random_path_chars: ascii_lowercase,digits

nginx_edge_acme_email: ""
nginx_edge_acme_enabled: true
nginx_edge_acme_challenge: http-01
nginx_edge_acme_webroot: /var/www/letsencrypt
nginx_edge_acme_dns_multi_credentials_path: /etc/letsencrypt/dns-multi.ini
nginx_edge_acme_cert_name: "{{ rssh_domain }}"
nginx_edge_acme_force_renewal: false
nginx_edge_acme_staging: false
# With nginx_edge_acme_challenge: http-01, retry through Timeweb DNS-01 when
# HTTP-01 fails and timewebcloud_auth_token is configured.
nginx_edge_acme_http01_fallback_to_dns_timeweb: true
# Before calling certbot for HTTP-01, create a real challenge file and fetch it
# from the control node. This avoids burning ACME authorization attempts when
# DNS, port 80, or nginx webroot routing is wrong.
nginx_edge_acme_http01_preflight_enabled: true
nginx_edge_acme_http01_preflight_timeout: 10
# Network-bound deployment tasks use bounded retries to survive transient DNS,
# package mirror, Snap Store, GitHub, and ACME API failures.
nginx_edge_network_retries: 5
nginx_edge_network_delay: 10
nginx_edge_snap_retries: 4
nginx_edge_snap_delay: 15
nginx_edge_snap_refresh_core_after_install: true
# Certbot installs through Snap first. If Snap Store remains unavailable after
# retries, the playbook removes only Certbot snap artifacts created by this run
# and installs Certbot in this virtualenv instead.
nginx_edge_certbot_install_method: snap
nginx_edge_certbot_snap_fallback_to_pip: true
nginx_edge_certbot_venv_path: /opt/certbot
# nginx_edge_certbot_pip_packages is derived by the playbook as certbot plus
# certbot-dns-multi when Timeweb DNS-01 can be used.
# Keep ACME retries conservative to avoid consuming Let's Encrypt failed
# validation limits during real DNS or HTTP challenge misconfiguration.
nginx_edge_acme_retries: 2
nginx_edge_acme_delay: 30
# When vps_internal_ip is not set explicitly, query the main logger for the
# source IP it sees from this VPS. Leave required=false to fall back to the
# logger's observed forwarder_ip when the probe is unavailable.
vps_internal_ip_probe_enabled: true
vps_internal_ip_probe_required: false
vps_internal_ip_probe_timeout: 5
vps_internal_ip_probe_validate_certs: true
# When ACME is enabled, keep these paths aligned with nginx_edge_acme_cert_name.
tls_cert_path: "/etc/letsencrypt/live/{{ nginx_edge_acme_cert_name }}/fullchain.pem"
tls_key_path: "/etc/letsencrypt/live/{{ nginx_edge_acme_cert_name }}/privkey.pem"
nginx_edge_create_self_signed_cert: false
nginx_edge_self_signed_days: 30

# Enable these for Timeweb DNS-01 instead of HTTP-01:
# nginx_edge_acme_challenge: dns-timeweb
# timewebcloud_auth_token: replace_with_TIMEWEBCLOUD_AUTH_TOKEN
# timewebcloud_propagation_timeout: 300
# timewebcloud_polling_interval: 5
# nginx_edge_acme_dns_multi_propagation_seconds: 300
# nginx_edge_acme_dns_multi_nameservers: "1.1.1.1:53,8.8.8.8:53"

nginx_edge_listen_addr: 127.0.0.1:18080
nginx_edge_capture_mode: mirror
nginx_edge_log_path: ""
nginx_edge_spool_dir: /var/lib/reverse-logger/nginx-edge-spool
nginx_edge_forward_interval: 1s
nginx_edge_forward_timeout: 5s

nginx_edge_conf_path: /etc/nginx/sites-available/rssh-entrypoint.conf
nginx_edge_sites_enabled_dir: /etc/nginx/sites-enabled
nginx_edge_remove_default_site: true
