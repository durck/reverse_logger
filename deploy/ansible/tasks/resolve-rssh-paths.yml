---
- name: Apply default public paths
  ansible.builtin.set_fact:
    rssh_ws_path: "{{ rssh_ws_path | default('/ws', true) }}"
    rssh_push_path: "{{ rssh_push_path | default('/push', true) }}"
    rssh_download_path_prefix: "{{ rssh_download_path_prefix | default('/dl', true) }}"
  when: not (rssh_random_paths_enabled | bool)

- name: Validate random path generation settings
  ansible.builtin.assert:
    that:
      - rssh_random_path_min_length | int >= 1
      - rssh_random_path_max_length | int >= rssh_random_path_min_length | int
      - rssh_random_path_chars | length > 0
    fail_msg: >-
      Invalid random path settings. Keep min/max sane and set
      rssh_random_path_chars to an Ansible password lookup character set.
  when: rssh_random_paths_enabled | bool

- name: Remove persisted random path state when explicitly requested
  ansible.builtin.file:
    path: "{{ rssh_random_paths_state_dir }}/{{ inventory_hostname }}.yml"
    state: absent
  delegate_to: localhost
  become: false
  when:
    - rssh_random_paths_enabled | bool
    - rssh_random_paths_allow_regenerate | default(true) | bool
    - rssh_random_paths_regenerate | bool

- name: Create random path state directory
  ansible.builtin.file:
    path: "{{ rssh_random_paths_state_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: rssh_random_paths_enabled | bool

- name: Check persisted random path state
  ansible.builtin.stat:
    path: "{{ rssh_random_paths_state_dir }}/{{ inventory_hostname }}.yml"
  delegate_to: localhost
  become: false
  register: rssh_random_path_state_file
  when: rssh_random_paths_enabled | bool

- name: Create persisted random path state
  ansible.builtin.copy:
    dest: "{{ rssh_random_paths_state_dir }}/{{ inventory_hostname }}.yml"
    mode: "0600"
    force: false
    content: |
      # Generated by Ansible. Keep this file private and do not commit it.
      rssh_random_ws_path: /{{ lookup('ansible.builtin.password', '/dev/null length=' ~ (range(rssh_random_path_min_length | int, (rssh_random_path_max_length | int) + 1) | random) ~ ' chars=' ~ rssh_random_path_chars) }}
      rssh_random_push_path: /{{ lookup('ansible.builtin.password', '/dev/null length=' ~ (range(rssh_random_path_min_length | int, (rssh_random_path_max_length | int) + 1) | random) ~ ' chars=' ~ rssh_random_path_chars) }}
      rssh_random_download_path_prefix: /{{ lookup('ansible.builtin.password', '/dev/null length=' ~ (range(rssh_random_path_min_length | int, (rssh_random_path_max_length | int) + 1) | random) ~ ' chars=' ~ rssh_random_path_chars) }}
  delegate_to: localhost
  become: false
  when:
    - rssh_random_paths_enabled | bool
    - not (rssh_random_path_state_file.stat.exists | default(false))

- name: Load persisted random path state
  ansible.builtin.include_vars:
    file: "{{ rssh_random_paths_state_dir }}/{{ inventory_hostname }}.yml"
    name: rssh_random_path_state
  when: rssh_random_paths_enabled | bool

- name: Validate persisted random path state
  ansible.builtin.assert:
    that:
      - rssh_random_path_state.rssh_random_ws_path is match('^/.+')
      - rssh_random_path_state.rssh_random_push_path is match('^/.+')
      - rssh_random_path_state.rssh_random_download_path_prefix is match('^/.+')
      - rssh_random_path_state.rssh_random_ws_path != '/'
      - rssh_random_path_state.rssh_random_push_path != '/'
      - rssh_random_path_state.rssh_random_download_path_prefix != '/'
      - rssh_random_path_state.rssh_random_ws_path[-1] != '/'
      - rssh_random_path_state.rssh_random_push_path[-1] != '/'
      - rssh_random_path_state.rssh_random_download_path_prefix[-1] != '/'
      - ([rssh_random_path_state.rssh_random_ws_path, rssh_random_path_state.rssh_random_push_path, rssh_random_path_state.rssh_random_download_path_prefix] | unique | length) == 3
    fail_msg: >-
      Persisted random path state is invalid. Delete the host file under
      rssh_random_paths_state_dir and rerun the deploy playbook to regenerate it.
  when: rssh_random_paths_enabled | bool

- name: Apply persisted random paths
  ansible.builtin.set_fact:
    rssh_ws_path: >-
      {{
        (
          rssh_random_paths_force | bool
          or (rssh_ws_path | default('/ws', true)) in ['', '/ws']
        )
        | ternary(rssh_random_path_state.rssh_random_ws_path, (rssh_ws_path | default('/ws', true)))
      }}
    rssh_push_path: >-
      {{
        (
          rssh_random_paths_force | bool
          or (rssh_push_path | default('/push', true)) in ['', '/push']
        )
        | ternary(rssh_random_path_state.rssh_random_push_path, (rssh_push_path | default('/push', true)))
      }}
    rssh_download_path_prefix: >-
      {{
        (
          rssh_random_paths_force | bool
          or (rssh_download_path_prefix | default('/dl', true)) in ['', '/dl']
        )
        | ternary(rssh_random_path_state.rssh_random_download_path_prefix, (rssh_download_path_prefix | default('/dl', true)))
      }}
  when: rssh_random_paths_enabled | bool
