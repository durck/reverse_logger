---
- name: Inspect pending target artifact manifest
  ansible.builtin.stat:
    path: "{{ reverse_logger_artifact_deploy_state_dir }}/pending.json"
  register: reverse_logger_artifact_pending_manifest

- name: Preserve current active artifact as previous
  ansible.builtin.copy:
    remote_src: true
    src: "{{ reverse_logger_artifact_deploy_state_dir }}/active.json"
    dest: "{{ reverse_logger_artifact_deploy_state_dir }}/previous.json"
    owner: root
    group: root
    mode: "0640"
  when:
    - reverse_logger_artifact_pending_manifest.stat.exists
    - reverse_logger_artifact_active_manifest_raw.content | default('') | length > 0

- name: Promote pending target artifact to active
  ansible.builtin.copy:
    remote_src: true
    src: "{{ reverse_logger_artifact_deploy_state_dir }}/pending.json"
    dest: "{{ reverse_logger_artifact_deploy_state_dir }}/active.json"
    owner: root
    group: root
    mode: "0640"
  when: reverse_logger_artifact_pending_manifest.stat.exists

- name: Remove promoted pending target artifact manifest
  ansible.builtin.file:
    path: "{{ reverse_logger_artifact_deploy_state_dir }}/pending.json"
    state: absent
  when: reverse_logger_artifact_pending_manifest.stat.exists
