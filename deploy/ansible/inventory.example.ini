# Copy to inventory.ini (gitignored).
#
# Parent group vps_edge contains 4 child groups. Each child group gets transport
# paths from group_vars/edge_group_N.yml. Shared secrets live in
# group_vars/vps_edge.yml.

[main]
main1 ansible_host=192.0.2.10

[main:vars]
ansible_user=root

[vps_edge:children]
edge_group_1
edge_group_2
edge_group_3
edge_group_4

[edge_group_1]
edge1 ansible_host=203.0.113.20 rssh_domain=entry1.example.com

[edge_group_2]
# edge2-a ansible_host=203.0.113.30 rssh_domain=entry2a.example.com

[edge_group_3]
# edge3-a ansible_host=203.0.113.40 rssh_domain=entry3a.example.com

[edge_group_4]
# edge4-a ansible_host=203.0.113.50 rssh_domain=entry4a.example.com

[vps_edge:vars]
ansible_user=root
