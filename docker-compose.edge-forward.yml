# Optional override. Use only if VPS edge-loggers must POST edge_events into
# the central logger over the private/internal bind IP.
#
# Start with:
# docker compose -f docker-compose.yml -f docker-compose.edge-forward.yml up -d

services:
  rssh-logger:
    ports:
      - "${REVERSE_SSH_BIND_IP:?set REVERSE_SSH_BIND_IP in .env}:${LOGGER_BIND_PORT:-8080}:8080"
