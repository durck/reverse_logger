# Optional override. Use when VPS edge forwarders must POST ingress events into
# the central logger, or when the dashboard should be reachable on a host
# interface protected by firewall allowlists.
#
# Start with:
# docker compose -f docker-compose.yml -f docker-compose.edge-forward.yml up -d

services:
  rssh-logger:
    ports:
      - "${LOGGER_BIND_IP:-127.0.0.1}:${LOGGER_BIND_PORT:-8080}:8080"
